<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스캐너">
<link rel="manifest" href="manifest.json">
<title>문서 스캐너</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--border:#2e2e2e;--green:#4ade80;--text:#fff;--text2:#a0a0a0;--text3:#555;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;user-select:none;}
.header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(15,15,15,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:17px;font-weight:700;}
.page-count{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:4px 10px;border-radius:20px;}
.main{padding-top:70px;padding-bottom:160px;min-height:100vh;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 230px);padding:40px 20px;text-align:center;}
.empty-icon{width:80px;height:80px;border:2px dashed var(--border);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px;color:var(--text3);}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-size:14px;color:var(--text2);line-height:1.6;}
.pages-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px;}
.page-item{position:relative;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);aspect-ratio:3/4;}
.page-item img{width:100%;height:100%;object-fit:cover;display:block;}
.page-num{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.7);color:#fff;font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;}
.page-delete{position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));}
.btn-row{display:flex;gap:10px;margin-bottom:10px;}
.btn{flex:1;padding:14px;border:none;border-radius:12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(0.97);}
.btn-camera{background:#fff;color:#000;}
.btn-gallery{background:var(--bg3);color:var(--text);border:1px solid var(--border);}
.btn-pdf{width:100%;padding:15px;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:var(--text);border:1px solid #3a3a3a;border-radius:12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-pdf:active{transform:scale(0.98);}
.btn-pdf:disabled{opacity:0.3;cursor:not-allowed;}
.btn-pdf.ready{background:linear-gradient(135deg,#16a34a,#15803d);border-color:#16a34a;}

/* 크롭 에디터 */
.crop-overlay{display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;}
.crop-overlay.show{display:flex;}
.crop-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.9);flex-shrink:0;}
.crop-title{font-size:15px;font-weight:700;}
.crop-hint{font-size:12px;color:#aaa;text-align:center;padding:8px 16px;background:rgba(0,0,0,0.7);flex-shrink:0;}
.crop-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#111;}
#cropCanvas{display:block;touch-action:none;max-width:100%;max-height:100%;}
.crop-footer{padding:16px 20px;padding-bottom:max(16px,env(safe-area-inset-bottom));display:flex;gap:10px;background:rgba(0,0,0,0.9);flex-shrink:0;}
.crop-btn{flex:1;padding:15px;border:none;border-radius:12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;}
.crop-btn-cancel{background:#242424;color:#fff;border:1px solid #333;}
.crop-btn-confirm{background:#16a34a;color:#fff;}

.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.show{display:flex;}
.spinner{width:44px;height:44px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:15px;color:var(--text2);}
.toast{position:fixed;bottom:180px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.3s;white-space:nowrap;z-index:400;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#cameraInput,#galleryInput{display:none;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">📄 문서 스캐너</div>
  <div class="page-count" id="pageCount">0 페이지</div>
</div>

<div class="main">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📷</div>
    <div class="empty-title">문서를 스캔해보세요</div>
    <div class="empty-sub">촬영 후 네 꼭짓점을 조정하면<br>문서만 반듯하게 잘라줘요<br>여러 장 모아서 PDF로 저장 가능</div>
  </div>
  <div class="pages-grid" id="pagesGrid" style="display:none;"></div>
</div>

<div class="bottom-bar">
  <div class="btn-row">
    <button class="btn btn-camera" onclick="openCamera()">📷 촬영</button>
    <button class="btn btn-gallery" onclick="openGallery()">🖼️ 갤러리</button>
  </div>
  <button class="btn-pdf" id="btnPdf" onclick="exportPdf()" disabled>📑 PDF 저장</button>
</div>

<!-- 크롭 에디터 -->
<div class="crop-overlay" id="cropOverlay">
  <div class="crop-header">
    <span class="crop-title">✂️ 문서 영역 조정</span>
    <span style="font-size:12px;color:#888" id="cropProgress"></span>
  </div>
  <div class="crop-hint">🟢 초록 점을 드래그해서 문서 네 모서리에 맞춰주세요</div>
  <div class="crop-canvas-wrap" id="cropWrap">
    <canvas id="cropCanvas"></canvas>
  </div>
  <div class="crop-footer">
    <button class="crop-btn crop-btn-cancel" onclick="skipCrop()">건너뛰기</button>
    <button class="crop-btn crop-btn-confirm" onclick="confirmCrop()">✓ 자르기</button>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleFiles(this)">
<input type="file" id="galleryInput" accept="image/*" multiple onchange="handleFiles(this)">

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">처리 중...</div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
let pages = [];
let cropQueue = [];
let cropCurrent = null;
let cropCorners = [];
let dragIdx = -1;
let canvasScale = 1;

function openCamera(){ document.getElementById('cameraInput').click(); }
function openGallery(){ document.getElementById('galleryInput').click(); }

async function handleFiles(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  input.value = '';
  for (const file of files) {
    const img = await loadImage(file);
    cropQueue.push(img);
  }
  processNextCrop();
}

function loadImage(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function processNextCrop() {
  if (!cropQueue.length) return;
  const img = cropQueue.shift();
  openCropEditor(img);
}

function openCropEditor(img) {
  const MAX = 1400;
  let w = img.naturalWidth || img.width;
  let h = img.naturalHeight || img.height;
  if (w > MAX || h > MAX) {
    const r = Math.min(MAX/w, MAX/h);
    w = Math.round(w*r); h = Math.round(h*r);
  }
  cropCurrent = { img, w, h };

  const overlay = document.getElementById('cropOverlay');
  overlay.classList.add('show');

  // 캔버스 크기 설정
  setTimeout(() => {
    const wrap = document.getElementById('cropWrap');
    const availW = wrap.clientWidth - 8;
    const availH = wrap.clientHeight - 8;
    canvasScale = Math.min(availW/w, availH/h);
    const dispW = Math.round(w * canvasScale);
    const dispH = Math.round(h * canvasScale);

    const canvas = document.getElementById('cropCanvas');
    canvas.width = dispW;
    canvas.height = dispH;

    // 초기 꼭짓점
    const pad = 0.06;
    cropCorners = [
      {x: Math.round(dispW*pad),     y: Math.round(dispH*pad)},
      {x: Math.round(dispW*(1-pad)), y: Math.round(dispH*pad)},
      {x: Math.round(dispW*(1-pad)), y: Math.round(dispH*(1-pad))},
      {x: Math.round(dispW*pad),     y: Math.round(dispH*(1-pad))},
    ];

    // 자동 감지
    autoDetect(dispW, dispH);

    const remaining = cropQueue.length;
    document.getElementById('cropProgress').textContent = remaining > 0 ? `남은 ${remaining}장` : '';

    drawCrop();
    bindEvents();
  }, 50);
}

function autoDetect(dw, dh) {
  const {img} = cropCurrent;
  const tmp = document.createElement('canvas');
  tmp.width = dw; tmp.height = dh;
  const ctx = tmp.getContext('2d');
  ctx.drawImage(img, 0, 0, dw, dh);
  const d = ctx.getImageData(0, 0, dw, dh).data;

  function br(x, y) {
    const i=(y*dw+x)*4;
    return d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
  }

  const bgBr = (br(3,3)+br(dw-4,3)+br(3,dh-4)+br(dw-4,dh-4))/4;
  const thr = 40;
  let top=Math.round(dh*0.05), bottom=Math.round(dh*0.95);
  let left=Math.round(dw*0.05), right=Math.round(dw*0.95);

  outer:for(let y=0;y<dh;y++)for(let x=Math.floor(dw*0.1);x<Math.floor(dw*0.9);x++)
    if(Math.abs(br(x,y)-bgBr)>thr){top=Math.max(0,y-6);break outer;}
  outer:for(let y=dh-1;y>=0;y--)for(let x=Math.floor(dw*0.1);x<Math.floor(dw*0.9);x++)
    if(Math.abs(br(x,y)-bgBr)>thr){bottom=Math.min(dh-1,y+6);break outer;}
  outer:for(let x=0;x<dw;x++)for(let y=Math.floor(dh*0.1);y<Math.floor(dh*0.9);y++)
    if(Math.abs(br(x,y)-bgBr)>thr){left=Math.max(0,x-6);break outer;}
  outer:for(let x=dw-1;x>=0;x--)for(let y=Math.floor(dh*0.1);y<Math.floor(dh*0.9);y++)
    if(Math.abs(br(x,y)-bgBr)>thr){right=Math.min(dw-1,x+6);break outer;}

  if((right-left)>dw*0.25 && (bottom-top)>dh*0.25) {
    cropCorners = [
      {x:left, y:top}, {x:right, y:top},
      {x:right, y:bottom}, {x:left, y:bottom}
    ];
  }
}

function drawCrop() {
  const c = document.getElementById('cropCanvas');
  const ctx = c.getContext('2d');
  const {img} = cropCurrent;
  ctx.clearRect(0,0,c.width,c.height);
  ctx.drawImage(img, 0, 0, c.width, c.height);

  // 외부 어둡게
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0,0,c.width,c.height);

  // 문서 영역 원본으로
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
  for(let i=1;i<4;i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
  ctx.closePath();
  ctx.clip();
  ctx.drawImage(img, 0, 0, c.width, c.height);
  ctx.restore();

  // 테두리
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cropCorners[0].x, cropCorners[0].y);
  for(let i=1;i<4;i++) ctx.lineTo(cropCorners[i].x, cropCorners[i].y);
  ctx.closePath();
  ctx.stroke();

  // 변 중간 가이드선
  ctx.setLineDash([6,4]);
  ctx.strokeStyle = 'rgba(74,222,128,0.4)';
  ctx.lineWidth = 1;
  for(let i=0;i<4;i++){
    const a=cropCorners[i], b=cropCorners[(i+1)%4];
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    ctx.beginPath(); ctx.arc(mx,my,5,0,Math.PI*2); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 꼭짓점 핸들
  const labels = ['좌상','우상','우하','좌하'];
  cropCorners.forEach((p,i) => {
    ctx.beginPath(); ctx.arc(p.x,p.y,22,0,Math.PI*2);
    ctx.fillStyle='rgba(74,222,128,0.15)'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,12,0,Math.PI*2);
    ctx.fillStyle='#4ade80'; ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 9px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(i+1, p.x, p.y);
  });
}

function bindEvents() {
  const c = document.getElementById('cropCanvas');
  const fresh = c.cloneNode(true);
  c.parentNode.replaceChild(fresh, c);
  const nc = document.getElementById('cropCanvas');
  // 이미지 다시 그리기
  drawCrop();

  function pos(e) {
    const rect = nc.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return {x: s.clientX-rect.left, y: s.clientY-rect.top};
  }
  function start(e) {
    e.preventDefault();
    const p = pos(e); dragIdx = -1;
    let minD = 50;
    cropCorners.forEach((c,i) => {
      const d = Math.hypot(c.x-p.x, c.y-p.y);
      if(d < minD){ minD=d; dragIdx=i; }
    });
  }
  function move(e) {
    e.preventDefault();
    if(dragIdx<0) return;
    const p = pos(e);
    cropCorners[dragIdx] = {
      x: Math.max(0,Math.min(nc.width,p.x)),
      y: Math.max(0,Math.min(nc.height,p.y))
    };
    drawCrop();
  }
  function end(){ dragIdx=-1; }

  nc.addEventListener('touchstart',start,{passive:false});
  nc.addEventListener('touchmove',move,{passive:false});
  nc.addEventListener('touchend',end);
  nc.addEventListener('mousedown',start);
  nc.addEventListener('mousemove',move);
  nc.addEventListener('mouseup',end);
}

async function confirmCrop() {
  document.getElementById('cropOverlay').classList.remove('show');
  showLoading('문서 처리 중...');
  const {img, w, h} = cropCurrent;
  const c = document.getElementById('cropCanvas');
  const sc = w / c.width;
  const real = cropCorners.map(p => ({x:p.x*sc, y:p.y*sc}));
  const result = await perspectiveWarp(img, real, w, h);
  pages.push(result);
  render();
  hideLoading();
  showToast('추가됐어요!');
  if(cropQueue.length>0) setTimeout(processNextCrop,300);
}

function skipCrop() {
  document.getElementById('cropOverlay').classList.remove('show');
  showLoading('처리 중...');
  const {img,w,h} = cropCurrent;
  const canvas = document.createElement('canvas');
  canvas.width=w; canvas.height=h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
  ctx.drawImage(img,0,0,w,h);
  const id = ctx.getImageData(0,0,w,h);
  enhanceDoc(id);
  ctx.putImageData(id,0,0);
  pages.push({dataUrl:canvas.toDataURL('image/jpeg',0.93),width:w,height:h});
  render(); hideLoading(); showToast('추가됐어요!');
  if(cropQueue.length>0) setTimeout(processNextCrop,300);
}

// ── 원근 보정 ─────────────────────────────────────
function perspectiveWarp(img, corners, w, h) {
  return new Promise(resolve => {
    const cx=corners.reduce((s,p)=>s+p.x,0)/4;
    const cy=corners.reduce((s,p)=>s+p.y,0)/4;
    const sorted = [
      corners.find(p=>p.x<=cx&&p.y<=cy)||corners[0],
      corners.find(p=>p.x>cx&&p.y<=cy)||corners[1],
      corners.find(p=>p.x>cx&&p.y>cy)||corners[2],
      corners.find(p=>p.x<=cx&&p.y>cy)||corners[3],
    ];
    const outW = Math.round(Math.max(
      Math.hypot(sorted[1].x-sorted[0].x,sorted[1].y-sorted[0].y),
      Math.hypot(sorted[2].x-sorted[3].x,sorted[2].y-sorted[3].y)
    ));
    const outH = Math.round(Math.max(
      Math.hypot(sorted[3].x-sorted[0].x,sorted[3].y-sorted[0].y),
      Math.hypot(sorted[2].x-sorted[1].x,sorted[2].y-sorted[1].y)
    ));

    const src = sorted;
    const dst = [{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];
    const M = getPerspective(src,dst);
    const Minv = invert3x3(M);

    const srcC = document.createElement('canvas');
    srcC.width=w; srcC.height=h;
    srcC.getContext('2d').drawImage(img,0,0,w,h);
    const srcCtx = srcC.getContext('2d');

    const outC = document.createElement('canvas');
    outC.width=outW; outC.height=outH;
    const outCtx = outC.getContext('2d');
    outCtx.fillStyle='#fff'; outCtx.fillRect(0,0,outW,outH);
    const outId = outCtx.createImageData(outW,outH);

    for(let y=0;y<outH;y++) {
      for(let x=0;x<outW;x++) {
        const denom = Minv[6]*x+Minv[7]*y+Minv[8];
        const sx = (Minv[0]*x+Minv[1]*y+Minv[2])/denom;
        const sy = (Minv[3]*x+Minv[4]*y+Minv[5])/denom;
        const di = (y*outW+x)*4;
        if(sx>=0&&sx<w&&sy>=0&&sy<h) {
          const sd = srcCtx.getImageData(Math.round(sx),Math.round(sy),1,1).data;
          outId.data[di]=sd[0];outId.data[di+1]=sd[1];outId.data[di+2]=sd[2];outId.data[di+3]=255;
        } else {
          outId.data[di]=255;outId.data[di+1]=255;outId.data[di+2]=255;outId.data[di+3]=255;
        }
      }
    }
    outCtx.putImageData(outId,0,0);
    const enhanced = outCtx.getImageData(0,0,outW,outH);
    enhanceDoc(enhanced);
    outCtx.putImageData(enhanced,0,0);
    resolve({dataUrl:outC.toDataURL('image/jpeg',0.93),width:outW,height:outH});
  });
}

function getPerspective(src,dst) {
  const A=[],b=[];
  for(let i=0;i<4;i++){
    const {x:sx,y:sy}=src[i],{x:dx,y:dy}=dst[i];
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]);b.push(dx);
    A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]);b.push(dy);
  }
  const h=gaussElim(A,b);
  return [...h,1];
}

function gaussElim(A,b) {
  const n=b.length;
  for(let c=0;c<n;c++){
    let mr=c;
    for(let r=c+1;r<n;r++) if(Math.abs(A[r][c])>Math.abs(A[mr][c]))mr=r;
    [A[c],A[mr]]=[A[mr],A[c]];[b[c],b[mr]]=[b[mr],b[c]];
    for(let r=c+1;r<n;r++){
      const f=A[r][c]/A[c][c];
      for(let k=c;k<n;k++)A[r][k]-=f*A[c][k];
      b[r]-=f*b[c];
    }
  }
  const x=new Array(n).fill(0);
  for(let i=n-1;i>=0;i--){
    x[i]=b[i]/A[i][i];
    for(let k=i-1;k>=0;k--)b[k]-=A[k][i]*x[i];
  }
  return x;
}

function invert3x3(m) {
  const det=m[0]*(m[4]*m[8]-m[5]*m[7])-m[1]*(m[3]*m[8]-m[5]*m[6])+m[2]*(m[3]*m[7]-m[4]*m[6]);
  return [
    (m[4]*m[8]-m[5]*m[7])/det,(m[2]*m[7]-m[1]*m[8])/det,(m[1]*m[5]-m[2]*m[4])/det,
    (m[5]*m[6]-m[3]*m[8])/det,(m[0]*m[8]-m[2]*m[6])/det,(m[2]*m[3]-m[0]*m[5])/det,
    (m[3]*m[7]-m[4]*m[6])/det,(m[1]*m[6]-m[0]*m[7])/det,(m[0]*m[4]-m[1]*m[3])/det,
  ];
}

function enhanceDoc(imageData) {
  const d=imageData.data,len=d.length;
  const brs=new Float32Array(len/4);
  for(let i=0,j=0;i<len;i+=4,j++) brs[j]=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
  const s=Float32Array.from(brs).sort();
  const p02=s[Math.floor(s.length*0.02)];
  const p98=s[Math.floor(s.length*0.98)];
  const range=p98-p02||1;
  for(let i=0;i<len;i+=4){
    let r=d[i],g=d[i+1],b=d[i+2];
    // 자동 레벨 (살짝만)
    r=Math.min(255,Math.max(0,Math.round(((r-p02)/range)*255)));
    g=Math.min(255,Math.max(0,Math.round(((g-p02)/range)*255)));
    b=Math.min(255,Math.max(0,Math.round(((b-p02)/range)*255)));
    const br=r*0.299+g*0.587+b*0.114;
    // 배경만 흰색, 글자는 원본 유지
    if(br>200){
      d[i]=255;d[i+1]=255;d[i+2]=255;
    } else if(br>160){
      // 밝은 회색 → 흰색으로 부드럽게
      const t=(br-160)/40;
      d[i]=Math.round(r+(255-r)*t);
      d[i+1]=Math.round(g+(255-g)*t);
      d[i+2]=Math.round(b+(255-b)*t);
    } else {
      // 글자 영역 → 원본 그대로 (뭉개짐 방지)
      d[i]=r;d[i+1]=g;d[i+2]=b;
    }
  }
}

function render() {
  const empty=document.getElementById('emptyState');
  const grid=document.getElementById('pagesGrid');
  const count=document.getElementById('pageCount');
  const btn=document.getElementById('btnPdf');
  count.textContent=pages.length+' 페이지';
  if(!pages.length){
    empty.style.display='flex';grid.style.display='none';
    btn.disabled=true;btn.classList.remove('ready');btn.innerHTML='📑 PDF 저장';return;
  }
  empty.style.display='none';grid.style.display='grid';
  btn.disabled=false;btn.classList.add('ready');
  btn.innerHTML=`📑 PDF 저장 (${pages.length}장)`;
  grid.innerHTML=pages.map((p,i)=>`
    <div class="page-item">
      <img src="${p.dataUrl}" alt="${i+1}">
      <div class="page-num">${i+1}</div>
      <button class="page-delete" onclick="deletePage(${i})">✕</button>
    </div>`).join('');
}

function deletePage(i){pages.splice(i,1);render();showToast('삭제했어요');}

async function exportPdf() {
  if(!pages.length)return;
  showLoading('PDF 생성 중...');
  try {
    await new Promise(r=>setTimeout(r,100));
    const {jsPDF}=window.jspdf;
    const f=pages[0];
    const pdf=new jsPDF({orientation:f.width>f.height?'landscape':'portrait',unit:'px',hotfixes:['px_scaling']});
    for(let i=0;i<pages.length;i++){
      const p=pages[i];
      if(i>0)pdf.addPage([p.width,p.height],p.width>p.height?'landscape':'portrait');
      pdf.setPage(i+1);
      const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
      pdf.addImage(p.dataUrl,'JPEG',0,0,pw,ph,'','FAST');
    }
    const n=new Date();
    pdf.save(`scan_${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}_${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}.pdf`);
    hideLoading();showToast('PDF 저장 완료!');
  } catch(e){hideLoading();showToast('오류: '+e.message);}
}

function showLoading(t){document.getElementById('loadingText').textContent=t;document.getElementById('loadingOverlay').classList.add('show');}
function hideLoading(){document.getElementById('loadingOverlay').classList.remove('show');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
